def mark_helpful(request):
    if request.method == "POST":
        review_id = request.POST.get("review_id")
        review = get_object_or_404(Review, id=review_id)

        # ✅ Prevent multiple clicks by same user (optional but good)
        review.helpful_count += 1
        review.save()

        return JsonResponse({
            "status": "updated",
            "count": review.helpful_count
        })

    return JsonResponse({"status": "error"})

class Favorite(models.Model):
    user = models.ForeignKey(User, on_delete=models.CASCADE)

    course = models.ForeignKey(Course, on_delete=models.CASCADE)

    added_at = models.DateTimeField(auto_now_add=True)

    class Meta:
        unique_together = ('user', 'course')  # no duplicates

    def __str__(self):
        return f"{self.user.username} - {self.course.name}"


# 🕒 USER HISTORY
class UserHistory(models.Model):
    user = models.ForeignKey(User, on_delete=models.CASCADE)

    course_name = models.CharField(max_length=300)

    skill_level = models.CharField(max_length=20, blank=True, null=True)

    language = models.CharField(max_length=50, blank=True, null=True)

    searched_at = models.DateTimeField(auto_now_add=True)

    class Meta:
        ordering = ['-searched_at']

    def __str__(self):
        return f"{self.user.username} - {self.course_name}"
