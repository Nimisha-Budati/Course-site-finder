<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register | Course Site Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* YOUR EXACT CSS (UNCHANGED) */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#fff;
  padding:20px;
}

.container{
  display:flex;
  width:900px;
  max-width:95%;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(18px);
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 25px 60px rgba(0,0,0,0.8);
  border:1px solid rgba(255,215,0,0.2);
}

.left{
  flex:1;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  background:linear-gradient(135deg,#ffd700,#00c896);
  color:#000;
}

.right{
  flex:1;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.right h2{
  margin-bottom:25px;
  font-size:26px;
}

.form-group{
  margin-bottom:18px;
}

label{
  display:block;
  font-size:13px;
  margin-bottom:5px;
  color:#aaa;
}

input{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

button{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#ffd700,#00c896);
  color:#000;
  font-weight:600;
  cursor:pointer;
}

.link{
  margin-top:18px;
  font-size:13px;
  color:#aaa;
  text-align:center;
}

.link a{
  color:#00c896;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <h2>Join Us 🚀</h2>
    <p>Create your account and start learning.</p>
  </div>

  <div class="right">
    <h2>Register</h2>

    <form method="POST">
      {% csrf_token %}

      {% if messages %}
        {% for message in messages %}
          <p style="color:red;">{{ message }}</p>
        {% endfor %}
      {% endif %}

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" id="username" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" id="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" id="password" required>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm_password" required>
      </div>

      <button type="submit" id="registerBtn">Register</button>

      <div class="link">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
      </div>

    </form>
  </div>

</div>

<!-- ONLY FIX (NO UI CHANGE) -->
<script>
document.querySelector("form").addEventListener("submit", function(e){

  const p1 = document.getElementById("password").value;
  const p2 = document.getElementById("confirm_password").value;

  if(p1 !== p2){
    e.preventDefault();
    alert("Passwords do not match!");
    return;
  }

  document.getElementById("registerBtn").disabled = true;
  document.getElementById("registerBtn").innerText = "Creating...";
});
</script>

</body>
</html>
