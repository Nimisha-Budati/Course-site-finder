<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login | Course Site Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* YOUR EXACT CSS (UNCHANGED) */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#fff;
  padding:20px;
}

.container{
  display:flex;
  width:900px;
  max-width:95%;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(18px);
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 25px 60px rgba(0,0,0,0.8);
  border:1px solid rgba(255,215,0,0.2);
}

.left{
  flex:1;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  background:linear-gradient(135deg,#ffd700,#00c896);
  color:#000;
}

.right{
  flex:1;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

input{
  width:100%;
  padding:13px;
  margin-bottom:15px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

button{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#ffd700,#00c896);
  color:#000;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <h2>Welcome Back 👋</h2>
    <p>Discover the best courses tailored for you.</p>
  </div>

  <div class="right">
    <h2>Login</h2>

    <form method="POST">
      {% csrf_token %}

      {% if messages %}
        {% for message in messages %}
          <p style="color:red;">{{ message }}</p>
        {% endfor %}
      {% endif %}

      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" id="password" placeholder="Password" required>

      <button type="submit" id="loginBtn">Login</button>

      <div class="link">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
      </div>
    </form>
  </div>

</div>

<!-- ONLY FIX: disable double submit -->
<script>
document.querySelector("form").addEventListener("submit", function(){
  document.getElementById("loginBtn").disabled = true;
  document.getElementById("loginBtn").innerText = "Loading...";
});
</script>

</body>
</html>
